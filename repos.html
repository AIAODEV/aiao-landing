<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aiao.dev — POC-oversigt</title>
<style>
  :root{
    --bg:#FAFAF8; --ink:#16161A; --grey:#6B6B72; --line:#E4E4E0;
    --surface:#FFFFFF; --accent:#E11D2A; --live:#16A34A; --radius:10px;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);
       font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:center;justify-content:space-between;
         padding:20px 24px;border-bottom:1px solid var(--line)}
  header nav a{color:var(--ink);text-decoration:none;margin-left:16px}
  .brand{font-weight:700;letter-spacing:.04em}
  main{max-width:880px;margin:0 auto;padding:32px 24px 8px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--grey);margin:0 0 24px}
  .search{width:100%;padding:10px 12px;border:1px solid var(--line);
          border-radius:var(--radius);background:var(--surface);
          font-family:var(--mono);font-size:14px;margin-bottom:20px}
  .row{border:1px solid var(--line);border-radius:var(--radius);
       background:var(--surface);margin-bottom:10px;overflow:hidden}
  .rowhead{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
  .repo{font-weight:600}
  .repo small{display:block;color:var(--grey);font-weight:400}
  .ava{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;
       display:grid;place-items:center;font-size:11px;font-weight:700;flex:none}
  .handle{color:var(--grey)}
  .spacer{flex:1}
  .badge{font-size:12px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--grey)}
  .badge.live{color:var(--live);border-color:var(--live)}
  .open{color:var(--ink);text-decoration:none;border:1px solid var(--line);
        border-radius:var(--radius);padding:6px 10px;white-space:nowrap}
  .detail{display:none;padding:0 16px 16px;border-top:1px solid var(--line)}
  .row.open-d .detail{display:block}
  .detail h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;
             color:var(--grey);margin:16px 0 4px}
  .detail div{margin:0}
  .stack span{display:inline-block;border:1px solid var(--line);border-radius:999px;
              padding:2px 8px;margin-right:6px;font-size:12px}
  .empty,.error{color:var(--grey);text-align:center;padding:48px 0}
  .error{color:var(--accent)}
  footer{color:var(--grey);text-align:center;padding:24px;border-top:1px solid var(--line);margin-top:24px}
</style>
</head>
<body>
<header>
  <span class="brand">aiao.dev</span>
  <nav><a href="/">Forside</a><a href="/flow">Flow</a><a href="/repos">POC'er</a></nav>
</header>
<main>
  <h1>POC-oversigt</h1>
  <p class="sub">Live interne proof-of-concepts. Samme skabelon, samme regler.</p>
  <input id="search" class="search" placeholder="Søg repo, ejer eller formål…" aria-label="Søg" />
  <div id="list"></div>
</main>
<footer id="count"></footer>
<script>
  var API = "https://aiao-control-plane-production.up.railway.app/public/repos";
  var ALL = [];

  function initials(name){
    if(!name) return "?";
    var p = name.trim().split(/\s+/).filter(Boolean);
    if(!p.length) return "?";
    return (p[0].charAt(0) + (p.length>1 ? p[p.length-1].charAt(0) : "")).toUpperCase();
  }
  function esc(s){ var d=document.createElement("div"); d.textContent = (s==null?"":String(s)); return d.innerHTML; }
  function fmtDate(s){ if(!s) return ""; var d=new Date(s); if(isNaN(d)) return s;
    return d.toLocaleDateString("da-DK",{year:"numeric",month:"long",day:"numeric"}); }
  function host(u){ return (u||"").replace(/^https?:\/\//,""); }
  function stack(r){
    var s=[]; if(r.has_vercel)s.push("Next.js"); if(r.has_railway)s.push("FastAPI"); if(r.has_supabase)s.push("Supabase");
    return s.map(function(x){return "<span>"+esc(x)+"</span>";}).join("");
  }

  function render(rows){
    var list = document.getElementById("list");
    var count = document.getElementById("count");
    if(!rows.length){
      var msg = ALL.length ? "Ingen match." : "Ingen aktive POC'er endnu.";
      list.innerHTML = '<div class="empty">'+esc(msg)+'</div>'; count.textContent=""; return;
    }
    list.innerHTML = rows.map(function(r){
      var live = !!r.is_live;
      var openable = /^https:\/\//i.test(r.live_url || "");
      return '<div class="row">'
        + '<div class="rowhead">'
        +   '<span class="ava">'+esc(initials(r.ejer_navn))+'</span>'
        +   '<span class="repo">AIAODEV/'+esc(r.poc)+'<small>'+esc(host(r.live_url))+'</small></span>'
        +   '<span class="spacer"></span>'
        +   (r.ejer_handle?'<span class="handle">@'+esc(r.ejer_handle)+'</span>':'')
        +   '<span class="badge'+(live?' live':'')+'">'+(live?'Live':'—')+'</span>'
        +   (openable?'<a class="open" href="'+esc(r.live_url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ Åbn</a>':'')
        + '</div>'
        + '<div class="detail">'
        +   '<h3>Ejer</h3><div>'+esc(r.ejer_navn||"—")+(r.ejer_afdeling?' · '+esc(r.ejer_afdeling):'')+'</div>'
        +   (r.formaal?'<h3>Formål</h3><div>'+esc(r.formaal)+'</div>':'')
        +   '<h3>Stak</h3><div class="stack">'+stack(r)+'</div>'
        +   (r.oprettet?'<h3>Oprettet</h3><div>'+esc(fmtDate(r.oprettet))+'</div>':'')
        +   (r.ai_resume?'<h3>Resumé</h3><div>'+esc(r.ai_resume)+'</div>':'')
        +   '<h3>Kontrol</h3><div>Bag adgangskode på subdomænet. Centralt ejerskab; rives ned efter brug.</div>'
        + '</div>'
        + '</div>';
    }).join("");
    count.textContent = rows.length + " af " + ALL.length + " POC'er vist · samme skabelon, samme regler";
    Array.prototype.forEach.call(list.querySelectorAll(".rowhead"), function(h){
      h.addEventListener("click", function(){ h.parentNode.classList.toggle("open-d"); });
    });
  }

  function applyFilter(){
    var q = document.getElementById("search").value.toLowerCase().trim();
    if(!q){ render(ALL); return; }
    render(ALL.filter(function(r){
      return [r.poc, r.display_name, r.ejer_navn, r.ejer_handle, r.formaal]
        .join(" ").toLowerCase().indexOf(q) !== -1;
    }));
  }

  document.getElementById("search").addEventListener("input", applyFilter);

  fetch(API)
    .then(function(res){ if(!res.ok) throw new Error("status "+res.status); return res.json(); })
    .then(function(data){ ALL = (data && data.repos) || []; render(ALL); })
    .catch(function(){ document.getElementById("list").innerHTML =
      '<div class="error">Kunne ikke hente POC-oversigten. Prøv igen senere.</div>';
      document.getElementById("count").textContent=""; });
</script>
</body>
</html>
